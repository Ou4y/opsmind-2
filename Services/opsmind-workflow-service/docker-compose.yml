services:
  workflow-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-runner}  # Use 'builder' for dev, 'runner' for prod
    container_name: opsmind-workflow
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3003
      SERVICE_NAME: opsmind-workflow
      DB_HOST: opsmind-mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: workflow_db
      DB_CONNECTION_LIMIT: 10
      DB_WAIT_FOR_CONNECTIONS: "true"
      AUTH_SERVICE_URL: http://opsmind-auth-service:3002
      TICKET_SERVICE_URL: http://opsmind-ticket-service:3000
      RABBITMQ_URL: amqp://opsmind:opsmind@rabbitmq:5672
      LOG_LEVEL: info
    volumes:
      # Mount source code for development (comment out for production)
      - ./src:/app/src:ro
      - ./db:/app/db:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Prevent overwriting node_modules and dist
      - /app/node_modules
      - /app/dist
    command: ${SERVICE_COMMAND:-node dist/index.js}  # Override with 'npm run dev' for hot-reload
    networks:
      - opsmind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ──────────────────────────────────────────────
# NOTE: MySQL container and the 'opsmind-net' network
# are defined in the infrastructure docker-compose.yml.
# This file only defines the workflow-service.
# The network is declared as external below.
# ──────────────────────────────────────────────

networks:
  opsmind-net:
    external: true
